services:
  postgres:
    image: postgres:16-alpine
    container_name: moon-institute-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leo
      POSTGRES_PASSWORD: leo
      POSTGRES_DB: moon_institute
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leo -d moon_institute"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
